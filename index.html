<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#176b59">
  <meta name="description" content="광주 서구 시민참여단 마을 안전지도 현장 의견 등록 웹앱">
  <title>서구 마을안전지도 시민참여단</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css?v=20260721-4">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="map-data.js?v=20260721-4" defer></script>
  <script src="firebase-config.js?v=20260721-4" defer></script>
  <script src="firebase-service.js?v=20260721-4" defer></script>
  <script src="app.js?v=20260721-4" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">안심</span>
      <div>
        <strong>서구 마을안전지도</strong>
        <span>여성친화도시 시민참여단</span>
      </div>
    </div>
    <span class="app-kind">시민참여단용</span>
  </header>

  <main>
    <section id="citizen-view" class="view" aria-labelledby="citizen-title">
      <div class="view-heading">
        <div>
          <p class="eyebrow">현장 의견 등록</p>
          <h1 id="citizen-title">우리 동네에서 불안한 곳을 알려주세요</h1>
        </div>
        <label class="select-label" for="citizen-dong">
          <span>확인할 동</span>
          <select id="citizen-dong"></select>
        </label>
      </div>

      <div id="connection-notice" class="notice connection-notice" role="status">
        <strong>자료 저장소 확인 중</strong>
        <span>잠시만 기다려주세요.</span>
      </div>

      <div class="map-shell">
        <div id="citizen-map" class="map" aria-label="시민참여단 안전지도"></div>
        <div id="map-instruction" class="map-instruction" hidden>지도에서 취약한 위치를 한 번 눌러주세요.</div>
        <div class="map-legend" aria-label="기존 안전시설 범례">
          <span class="legend-item return">□ 안심귀갓길</span>
          <span class="legend-item alley">○ 안전골목</span>
          <span class="legend-item parcel">☆ 택배보관함</span>
          <span class="legend-item vending">△ 생리대 자판기</span>
          <span class="legend-item report">● 참여단 의견</span>
        </div>
      </div>

      <div class="action-bar">
        <div>
          <strong id="citizen-dong-title">양동 지도</strong>
          <span>기존 시설은 확인만 가능하며, 참여단 의견은 별도로 표시됩니다.</span>
        </div>
        <button type="button" id="start-report" class="primary-button">＋ 취약 위치 등록</button>
      </div>

      <section class="my-reports" aria-labelledby="my-reports-title">
        <div class="section-title-row">
          <h2 id="my-reports-title">이 기기에 등록한 의견</h2>
          <span id="my-report-count" class="count-badge">0건</span>
        </div>
        <div id="my-report-list" class="report-list"></div>
      </section>
    </section>
  </main>

  <dialog id="report-dialog" class="report-dialog">
    <form id="report-form" method="dialog">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">현장 의견</p>
          <h2>어떤 점이 취약한가요?</h2>
        </div>
        <button type="button" id="close-dialog" class="icon-button" aria-label="닫기">×</button>
      </div>

      <p id="selected-location" class="selected-location">위치를 선택했습니다.</p>

      <fieldset>
        <legend>취약 유형을 선택해주세요</legend>
        <div class="type-grid">
          <label><input type="radio" name="type" value="dark" required><span>어두워요</span></label>
          <label><input type="radio" name="type" value="surveillance"><span>CCTV·비상벨 부족</span></label>
          <label><input type="radio" name="type" value="visibility"><span>시야가 가려져요</span></label>
          <label><input type="radio" name="type" value="walking"><span>보행하기 위험해요</span></label>
          <label><input type="radio" name="type" value="anxiety"><span>혼자 걷기 불안해요</span></label>
          <label><input type="radio" name="type" value="other"><span>기타</span></label>
        </div>
      </fieldset>

      <label class="text-label" for="report-note">
        <span>간단한 의견</span>
        <textarea id="report-note" maxlength="120" rows="4" placeholder="예: 골목이 어둡고 가로등 간격이 멀어요." required></textarea>
        <small><span id="note-count">0</span>/120자</small>
      </label>

      <div class="dialog-actions">
        <button type="button" id="cancel-report" class="secondary-button">취소</button>
        <button type="submit" class="primary-button">의견 등록</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <noscript>이 웹앱은 지도를 표시하기 위해 자바스크립트가 필요합니다.</noscript>
</body>
</html>
